<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ocelli — interactive demo (4-person team)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* demo-only chrome — everything else comes from the real stylesheet */
    .demo-badge { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: #fff;
      background: var(--accent); border-radius: 99px; padding: 3px 10px; margin-left: 10px; vertical-align: 3px; }
    .demo-banner { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; border-radius: var(--radius);
      padding: 10px 14px; font-size: 12.5px; margin-bottom: 14px; }
    .demo-banner b { font-weight: 700; }
  </style>
</head>
<body>
  <div id="app"><div class="loading">Loading demo…</div></div>

  <script>
  /* ── Ocelli interactive DEMO — same rendering as the real app, mock data, no auth ── */
  (() => {
    const $ = (sel, el = document) => el.querySelector(sel);
    const app = $("#app");
    const VIEWER_TZ = "Asia/Taipei"; // the demo viewer ("You")

    /* ── mock team. busyLocal = [startHour, endHour, label] in that person's OWN timezone ── */
    const TEAM = [
      { email: "alex@example.com",   name: "Alex Chen", role: "Product",     tz: "Asia/Taipei",    workStart: 9,  workEnd: 18,
        busyLocal: [[9.5, 10.5, "Standup"], [14, 15, "Focus block"]] },
      { email: "mei@example.com",   name: "Mei Lin",        role: "Design",      tz: "Asia/Singapore", workStart: 9,  workEnd: 18,
        busyLocal: [[10, 11.5, "Customer call"], [17.25, 17.75, "Coffee chat"]] },
      { email: "arjun@example.com", name: "Arjun Rao",      role: "Engineering", tz: "Asia/Kolkata",   workStart: 10, workEnd: 19,
        busyLocal: [[12.5, 13.25, "Lunch"], [16, 17, "Code review"]] },
      { email: "sarah@example.com", name: "Sarah Chen",     role: "Marketing",   tz: "Europe/London",  workStart: 8,  workEnd: 16,
        busyLocal: [[8, 8.75, "Inbox"], [14, 15, "1:1 with manager"]] },
      { email: "lisa@example.com",  name: "Lisa Park",      role: "Manager (US)", tz: "America/New_York", workStart: 9, workEnd: 17,
        busyLocal: [[9, 9.75, "Exec sync"], [13, 14, "Hiring panel"]] },
    ];
    const me = TEAM[0];

    /* request specs positioned by VIEWER-clock hours (Asia/Taipei) so they line up across lanes */
    let REQ_SEED = [
      { id: "r1", title: "Weekly design sync", requester: "mei@example.com", requesterName: "Mei Lin",
        attendees: ["alex@example.com", "arjun@example.com"], status: "confirmed",
        vStart: 13, vEnd: 13.5, responses: { "alex@example.com": "accept", "arjun@example.com": "accept" },
        eventLink: "#", notes: "Reviewed the new onboarding flow mockups. Agreed to ship the simplified 3-step version and drop the optional tour. Mei finalizing copy; Arjun to wire analytics on each step.",
        actions: [
          { text: "Finalize onboarding copy", owner: "Mei", done: true },
          { text: "Add analytics events to step 2", owner: "Arjun", done: false },
          { text: "Schedule usability test with 3 users", owner: "Vimal", done: false },
        ] },
      { id: "r2", title: "Q3 roadmap", requester: "sarah@example.com", requesterName: "Sarah Chen",
        attendees: ["alex@example.com", "mei@example.com", "arjun@example.com"], status: "pending",
        vStart: 16, vEnd: 17, responses: { "mei@example.com": "accept", "arjun@example.com": "accept" },
        eventLink: null, notes: "", actions: [] },
    ];

    let date = todayStr();
    let selected = new Set(TEAM.map((m) => m.email)); // all four selected so the overlap strip shows
    let duration = 60, modal = null;

    /* ── date / tz helpers (identical to the real app) ── */
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }
    function shiftDate(n) {
      const [y, m, d] = date.split("-").map(Number);
      const dt = new Date(y, m - 1, d + n);
      return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
    }
    function fmtDateLabel(ds) {
      const [y, m, d] = ds.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      if (ds === todayStr()) return "Today";
      return dt.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    }
    function dayStartLocal() {
      const [y, m, d] = date.split("-").map(Number);
      return new Date(y, m - 1, d).getTime();
    }
    function tzOffsetMin(tz, atMs) {
      try {
        const dtf = new Intl.DateTimeFormat("en-US", { timeZone: tz, hour12: false,
          year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
        const p = {};
        dtf.formatToParts(new Date(atMs)).forEach((x) => (p[x.type] = x.value));
        const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, p.hour === "24" ? 0 : +p.hour, +p.minute);
        return (asUTC - atMs) / 60000;
      } catch { return 0; }
    }
    function memberLocalToInstant(tz, hour, dayShift = 0) {
      const [y, m, d] = date.split("-").map(Number);
      const roughUTC = Date.UTC(y, m - 1, d + dayShift, Math.floor(hour), Math.round((hour % 1) * 60));
      return roughUTC - tzOffsetMin(tz, roughUTC) * 60000;
    }
    const instToHour = (ms) => (ms - dayStartLocal()) / 3.6e6;
    function fmtHM(ms, tz) {
      return new Intl.DateTimeFormat("en-US", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false }).format(new Date(ms));
    }
    function localClock(tz) { try { return fmtHM(Date.now(), tz); } catch { return "--:--"; } }

    /* viewer-clock instant for a given viewer-local hour on the chosen date */
    const viewerHourToInstant = (h) => dayStartLocal() + h * 3.6e6;

    /* ── build live team + requests for the currently-viewed date ── */
    function buildTeam() {
      return TEAM.map((m) => ({
        ...m, connected: true,
        busy: m.busyLocal.map(([s, e, label]) => ({
          start: memberLocalToInstant(m.tz, s), end: memberLocalToInstant(m.tz, e), label,
        })),
      }));
    }
    function buildRequests() {
      return REQ_SEED.map((r) => ({ ...r, start: viewerHourToInstant(r.vStart), end: viewerHourToInstant(r.vEnd) }));
    }
    let team = buildTeam(), requests = buildRequests();

    /* ── availability helpers ── */
    function workBands(member) {
      // STRICT: exactly one band per person — the workday that STARTS on the
      // viewed date. A late-night band (e.g. US seen from Asia) clips at your
      // midnight and continues on the NEXT day's view, never wraps to the left.
      const day0 = dayStartLocal(), dayEnd = day0 + 24 * 3.6e6;
      const bands = [];
      for (const shift of [-1, 0, 1]) {
        const s = memberLocalToInstant(member.tz, member.workStart, shift);
        let e = memberLocalToInstant(member.tz, member.workEnd, shift);
        if (e <= s) e += 24 * 3.6e6;
        if (s >= day0 && s < dayEnd) bands.push([s, e]);
      }
      return bands;
    }
    const inAnyBand = (t, bands) => bands.some(([s, e]) => t >= s && t < e);
    function clampSeg(s, e) {
      const a = Math.max(0, instToHour(s)), b = Math.min(24, instToHour(e));
      if (b <= a) return null;
      return { left: (a / 24) * 100, width: ((b - a) / 24) * 100 };
    }
    function requestBlocksFor(email) {
      return requests
        .filter((r) => r.status !== "declined" && (r.attendees.includes(email) || r.requester === email))
        .map((r) => ({ start: r.start, end: r.end, status: r.status, title: r.title }));
    }
    function freeSlots() {
      const sel = team.filter((m) => selected.has(m.email));
      if (sel.length < 2) return Array(48).fill(false);
      const day0 = dayStartLocal(), need = duration / 30;
      const stepFree = [];
      for (let s = 0; s < 48; s++) {
        const t = day0 + s * 1.8e6;
        stepFree.push(sel.every((m) => {
          if (!inAnyBand(t, workBands(m))) return false;
          if (m.busy.some((b) => t >= b.start && t < b.end)) return false;
          if (requestBlocksFor(m.email).some((b) => t >= b.start && t < b.end)) return false;
          return true;
        }));
      }
      return stepFree.map((_, s) => {
        if (s + need > 48) return false;
        for (let k = 0; k < need; k++) if (!stepFree[s + k]) return false;
        return true;
      });
    }

    /* ── rendering ── */
    function esc(s) { return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
    function fmtSlot(s) { return `${String(Math.floor(s / 2)).padStart(2, "0")}:${s % 2 ? "30" : "00"}`; }

    function render() {
      const day0 = dayStartLocal();
      const nowH = (Date.now() - day0) / 3.6e6;
      const slots = freeSlots();
      const freeCount = slots.filter(Boolean).length;
      const isToday = date === todayStr();

      app.innerHTML = `
      <div class="app"><div class="wrap">
        <div class="topbar">
          <div class="brand">
            <h1>Ocelli<span class="demo-badge">DEMO</span></h1>
            <p>Every row is on <b>your clock</b> (${esc(VIEWER_TZ)}). Dark shading = night for that person.</p>
          </div>
          <div class="userchip">
            <div class="who-initials" style="width:30px;height:30px;font-size:11px">VD</div>
            <span class="uname">${esc(me.name)}</span>
            <a class="btn ghost sm" href="/dashboard.html" style="text-decoration:none">Today →</a>
            <button class="btn ghost sm" id="profileBtn">My hours</button>
          </div>
        </div>

        <div class="demo-banner">
          <b>This is a preview with sample data</b> — a 5-person team across Taipei, Singapore, Bangalore, London &amp; New York.
          Try it: tick/untick people, click a <b>green</b> slot to request a meeting, hit <b>Accept</b> on the pending request,
          or open <b>Notes</b> / <b>Prep brief</b>. Nothing here touches a real Google account.
        </div>

        <div class="toolbar">
          <div class="day-nav">
            <button id="prevDay" title="Previous day">‹</button>
            <span class="day-label">${esc(fmtDateLabel(date))}</span>
            <button id="nextDay" title="Next day">›</button>
          </div>
          <button class="btn ghost sm" id="todayBtn" ${isToday ? "disabled" : ""}>Today</button>
          <div class="toolbar-right">
            <label>Length</label>
            <select id="durPick">
              <option value="30"  ${duration === 30 ? "selected" : ""}>30 min</option>
              <option value="60"  ${duration === 60 ? "selected" : ""}>1 hour</option>
              <option value="90"  ${duration === 90 ? "selected" : ""}>1.5 hrs</option>
              <option value="120" ${duration === 120 ? "selected" : ""}>2 hours</option>
            </select>
          </div>
        </div>

        <div class="card">
          <div class="gantt-header">
            ${Array.from({ length: 24 }, (_, h) => `<span>${h % 3 === 0 ? h + ":00" : ""}</span>`).join("")}
          </div>
          ${team.map((m) => rowHTML(m, nowH)).join("")}

          <div class="slots-section">
            <div class="slots-label">
              ${selected.size >= 2
                ? freeCount > 0
                  ? `${freeCount} free slot${freeCount > 1 ? "s" : ""} for all ${selected.size} selected — click a green slot to request a meeting`
                  : `No free slots for all ${selected.size} selected people on this day`
                : "Tick at least 2 people (including yourself) to find shared free time"}
            </div>
            <div class="slotstrip">
              ${slots.map((ok, s) => `<div class="slot${ok ? " ok" : ""}" data-slot="${s}" ${ok ? `tabindex="0" title="${fmtSlot(s)} your time — everyone free"` : ""}></div>`).join("")}
            </div>
          </div>

          <div class="legend">
            <span><i style="background:var(--free-soft);border:1px solid var(--free-border)"></i>Working hours</span>
            <span><i style="background:var(--busy)"></i>Busy</span>
            <span><i style="background:var(--pending)"></i>Pending request</span>
            <span><i style="background:var(--confirmed)"></i>Confirmed</span>
            <span><i style="background:var(--night);opacity:.35"></i>Night for them</span>
            <span><i style="background:var(--accent)"></i>Now</span>
            <span><i style="background:var(--free)"></i>Everyone free</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Meeting requests</div>
          ${requests.length === 0
            ? `<div style="font-size:13px;color:var(--mut);padding:6px 0">No requests yet.</div>`
            : requests.map(reqHTML).join("")}
        </div>
      </div></div>
      ${modal ? modalHTML() : ""}
      <div class="tip" id="tt"></div>`;

      bindEvents();
      setupTooltips();
    }

    function rowHTML(m, nowH) {
      const bands = workBands(m).map(([s, e]) => clampSeg(s, e)).filter(Boolean);
      const busy = m.busy.map((b) => ({ seg: clampSeg(b.start, b.end), ...b })).filter((x) => x.seg);
      const reqBlocks = requestBlocksFor(m.email).map((b) => ({ seg: clampSeg(b.start, b.end), ...b })).filter((x) => x.seg);
      const day0 = dayStartLocal();
      const nights = Array.from({ length: 24 }, (_, c) => {
        const lh = +new Intl.DateTimeFormat("en-US", { timeZone: m.tz, hour: "2-digit", hour12: false })
          .format(new Date(day0 + c * 3.6e6 + 1.8e6));
        return lh < 7 || lh >= 20 ? `<div class="nightcell" style="left:${(c / 24) * 100}%;width:${100 / 24}%"></div>` : "";
      }).join("");

      const initials = m.name.split(" ").map((w) => w[0] || "").join("").slice(0, 2).toUpperCase();

      return `<div class="row">
        <div class="who">
          <div class="who-initials">${esc(initials)}</div>
          <div class="who-info">
            <div class="nm">
              <input type="checkbox" data-sel="${esc(m.email)}" ${selected.has(m.email) ? "checked" : ""} aria-label="Include ${esc(m.name)}">
              <span class="nm-label">${esc(m.name)}</span>
              ${m.email === me.email ? `<span class="you-badge">you</span>` : ""}
            </div>
            <div class="rl">${esc(m.role)} · ${esc(m.tz)} · ${localClock(m.tz)} there</div>
          </div>
        </div>
        <div class="lane">
          ${nights}
          ${bands.map((s) => `<div class="band" style="left:${s.left}%;width:${s.width}%"></div>`).join("")}
          ${busy.map((b) => `<div class="blk busy" style="left:${b.seg.left}%;width:${b.seg.width}%"
            data-tip="${esc(b.label)} · ${fmtHM(b.start, m.tz)}–${fmtHM(b.end, m.tz)} (${esc(m.tz)})"><span>${esc(b.label)}</span></div>`).join("")}
          ${reqBlocks.map((b) => `<div class="blk ${b.status}" style="left:${b.seg.left}%;width:${b.seg.width}%"
            data-tip="${esc(b.title)} · ${fmtHM(b.start, m.tz)}–${fmtHM(b.end, m.tz)} · ${b.status}"><span>${esc(b.title)}</span></div>`).join("")}
          ${nowH >= 0 && nowH <= 24 ? `<div class="nowline" style="left:${(nowH / 24) * 100}%"></div>` : ""}
        </div>
      </div>`;
    }

    function reqHTML(r) {
      const mine = r.requester === me.email;
      const canRespond = r.status === "pending" && r.attendees.includes(me.email) && r.responses[me.email] !== "accept";
      return `<div class="req">
        <div>
          <div class="req-title">${esc(r.title)}</div>
          <div class="req-meta">
            ${fmtHM(r.start, VIEWER_TZ)}–${fmtHM(r.end, VIEWER_TZ)} your time ·
            by ${esc(r.requesterName)} · with ${r.attendees.map((e) => esc(nameOf(e))).join(", ")}
            ${r.eventLink ? ` · <a href="${esc(r.eventLink)}" onclick="return false">Open in Calendar</a>` : ""}
          </div>
        </div>
        <div class="req-actions">
          <span class="pill ${r.status}">${r.status}</span>
          ${canRespond ? `<button class="btn teal sm" data-accept="${r.id}">Accept</button>
                          <button class="btn ghost sm" data-decline="${r.id}">Decline</button>` : ""}
          ${r.status !== "declined" ? `<button class="btn ghost sm" data-notes="${r.id}">Notes</button>
                                       <button class="btn ghost sm" data-brief="${r.id}">Prep brief</button>` : ""}
          ${mine && r.status === "pending" ? `<button class="btn ghost sm" data-cancel="${r.id}">Cancel</button>` : ""}
        </div>
      </div>`;
    }
    const nameOf = (email) => (TEAM.find((m) => m.email === email) || {}).name || email;

    function modalHTML() {
      if (modal.type === "notes") {
        const d = modal.draft;
        return `<div class="overlay" id="ovl"><div class="modal">
          <h3>Meeting memory — ${esc(d.title)}</h3>
          <div class="fld"><label>What was discussed / decided</label>
            <textarea id="nNotes" rows="6" style="width:100%;font-family:inherit;font-size:13px;padding:8px;border:1px solid var(--line);border-radius:8px">${esc(d.notes || "")}</textarea>
          </div>
          <div style="font-size:12px;font-weight:600;margin:6px 0">Action items</div>
          ${d.actions.map((a, i) => `<div style="display:flex;gap:6px;margin:4px 0;align-items:center">
            <input type="checkbox" data-adone="${i}" ${a.done ? "checked" : ""} title="done?">
            <input data-atext="${i}" value="${esc(a.text)}" placeholder="task" style="flex:2">
            <input data-aowner="${i}" value="${esc(a.owner)}" placeholder="owner" style="flex:1">
            <button class="btn ghost sm" data-adel="${i}">✕</button>
          </div>`).join("")}
          <button class="btn ghost sm" id="nAdd" style="margin-top:4px">+ Add action item</button>
          <div class="modal-actions">
            <button class="btn ghost" id="mCancel">Cancel</button>
            <button class="btn teal" id="nSave">Save</button>
          </div>
        </div></div>`;
      }
      if (modal.type === "brief") {
        return `<div class="overlay" id="ovl"><div class="modal">
          <h3>Prep brief</h3>
          <div style="white-space:pre-wrap;font-size:13px;background:var(--paper);padding:12px;border-radius:8px">${esc(modal.text)}</div>
          ${modal.pending.length
            ? `<div style="font-size:12px;font-weight:600;margin:10px 0 4px">Still open from previous meetings</div>` +
              modal.pending.map((a) => `<div class="tzline">→ ${esc(a.text)}${a.owner ? ` — <b>${esc(a.owner)}</b>` : ""}</div>`).join("")
            : ""}
          <div style="font-size:11px;color:var(--mut);margin-top:10px">In the live app this paragraph is written by Gemini or Claude from the previous meeting's notes; without a key it falls back to a template like this.</div>
          <div class="modal-actions"><button class="btn ghost" id="mCancel">Close</button></div>
        </div></div>`;
      }
      if (modal.type === "profile") {
        return `<div class="overlay" id="ovl"><div class="modal">
          <h3>My working hours</h3>
          <div class="fld"><label>Role / title</label><input id="pRole" value="${esc(me.role || "")}"></div>
          <div style="display:flex;gap:10px">
            <div class="fld" style="flex:1"><label>Work starts (local)</label>
              <input id="pStart" type="number" min="0" max="23" value="${me.workStart}"></div>
            <div class="fld" style="flex:1"><label>Work ends</label>
              <input id="pEnd" type="number" min="1" max="24" value="${me.workEnd}"></div>
          </div>
          <div style="font-size:11px;color:var(--mut);margin-top:4px">In the live app your timezone is read from Google Calendar: <b>${esc(me.tz)}</b></div>
          <div class="modal-actions">
            <button class="btn ghost" id="mCancel">Cancel</button>
            <button class="btn teal" id="pSave">Save</button>
          </div>
        </div></div>`;
      }
      // request modal
      const startMs = viewerHourToInstant(modal.slot / 2);
      const endMs = startMs + duration * 60000;
      const sel = team.filter((m) => selected.has(m.email));
      return `<div class="overlay" id="ovl"><div class="modal">
        <h3>Send meeting request</h3>
        <div class="fld"><label>Title</label><input id="mTitle" placeholder="e.g. Sprint planning" autofocus></div>
        <div style="font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px">This time for each person</div>
        ${sel.map((m) => `<div class="tzline"><b>${esc(m.name)}</b> — ${fmtHM(startMs, m.tz)}–${fmtHM(endMs, m.tz)} <span style="color:var(--mut)">(${esc(m.tz)})</span></div>`).join("")}
        <div style="font-size:11px;color:var(--mut);margin-top:10px">When everyone accepts, a Google Calendar event with a Meet link is created automatically.</div>
        <div class="modal-actions">
          <button class="btn ghost" id="mCancel">Cancel</button>
          <button class="btn teal" id="mSend">Send request</button>
        </div>
      </div></div>`;
    }

    /* ── tooltip ── */
    function setupTooltips() {
      const tt = $("#tt");
      if (!tt) return;
      document.querySelectorAll("[data-tip]").forEach((el) => {
        el.addEventListener("mouseenter", (e) => {
          tt.textContent = el.dataset.tip; tt.style.opacity = "1";
          tt.style.left = e.clientX + 12 + "px"; tt.style.top = e.clientY - 36 + "px";
        });
        el.addEventListener("mousemove", (e) => { tt.style.left = e.clientX + 12 + "px"; tt.style.top = e.clientY - 36 + "px"; });
        el.addEventListener("mouseleave", () => { tt.style.opacity = "0"; });
      });
    }

    /* ── events ── */
    function refresh() { team = buildTeam(); requests = buildRequests(); render(); }

    function bindEvents() {
      $("#prevDay")?.addEventListener("click", () => { date = shiftDate(-1); refresh(); });
      $("#nextDay")?.addEventListener("click", () => { date = shiftDate(1); refresh(); });
      $("#todayBtn")?.addEventListener("click", () => { date = todayStr(); refresh(); });
      $("#durPick")?.addEventListener("change", (e) => { duration = +e.target.value; render(); });
      $("#profileBtn")?.addEventListener("click", () => { modal = { type: "profile" }; render(); });

      document.querySelectorAll("[data-sel]").forEach((cb) =>
        cb.addEventListener("change", () => { cb.checked ? selected.add(cb.dataset.sel) : selected.delete(cb.dataset.sel); render(); }));
      document.querySelectorAll(".slot.ok").forEach((el) => {
        const open = () => { modal = { type: "request", slot: +el.dataset.slot }; render(); };
        el.addEventListener("click", open);
        el.addEventListener("keydown", (e) => e.key === "Enter" && open());
      });
      document.querySelectorAll("[data-accept]").forEach((b) => b.addEventListener("click", () => respond(b.dataset.accept, "accept")));
      document.querySelectorAll("[data-decline]").forEach((b) => b.addEventListener("click", () => respond(b.dataset.decline, "decline")));
      document.querySelectorAll("[data-cancel]").forEach((b) =>
        b.addEventListener("click", () => { REQ_SEED = REQ_SEED.filter((r) => r.id !== b.dataset.cancel); refresh(); }));

      // meeting memory: notes
      document.querySelectorAll("[data-notes]").forEach((b) =>
        b.addEventListener("click", () => {
          const r = REQ_SEED.find((x) => x.id === b.dataset.notes);
          modal = { type: "notes", id: r.id, draft: { title: r.title, notes: r.notes || "", actions: (r.actions || []).map((a) => ({ ...a })) } };
          render();
        }));
      // meeting memory: prep brief (templated from the request's own notes for the demo)
      document.querySelectorAll("[data-brief]").forEach((b) =>
        b.addEventListener("click", () => {
          const r = REQ_SEED.find((x) => x.id === b.dataset.brief);
          const done = (r.actions || []).filter((a) => a.done);
          const open = (r.actions || []).filter((a) => !a.done);
          const text = (r.notes
            ? `Recap of the last "${r.title}":\n${r.notes}\n\n` +
              (done.length ? `✓ Done since: ${done.map((a) => a.text).join("; ")}\n` : "") +
              (open.length ? `→ Still open: ${open.map((a) => `${a.text}${a.owner ? ` (${a.owner})` : ""}`).join("; ")}\n\n` : "\n") +
              `Suggested agenda:\n• Confirm the items above are still on track\n• Unblock anything stuck\n• Decide next steps and owners`
            : `This looks like the first meeting in this series — no history yet. Add notes and action items afterwards and you'll get a full prep brief before the next one.`);
          modal = { type: "brief", text, pending: open };
          render();
        }));
      // notes editor internals
      $("#nNotes")?.addEventListener("input", (e) => (modal.draft.notes = e.target.value));
      $("#nAdd")?.addEventListener("click", () => { modal.draft.actions.push({ text: "", owner: "", done: false }); render(); });
      document.querySelectorAll("[data-atext]").forEach((i) => i.addEventListener("input", () => (modal.draft.actions[+i.dataset.atext].text = i.value)));
      document.querySelectorAll("[data-aowner]").forEach((i) => i.addEventListener("input", () => (modal.draft.actions[+i.dataset.aowner].owner = i.value)));
      document.querySelectorAll("[data-adone]").forEach((i) => i.addEventListener("change", () => (modal.draft.actions[+i.dataset.adone].done = i.checked)));
      document.querySelectorAll("[data-adel]").forEach((b) => b.addEventListener("click", () => { modal.draft.actions.splice(+b.dataset.adel, 1); render(); }));
      $("#nSave")?.addEventListener("click", () => {
        const r = REQ_SEED.find((x) => x.id === modal.id);
        r.notes = modal.draft.notes;
        r.actions = modal.draft.actions.filter((a) => a.text.trim());
        modal = null; refresh();
      });

      $("#ovl")?.addEventListener("click", (e) => { if (e.target.id === "ovl") { modal = null; render(); } });
      $("#mCancel")?.addEventListener("click", () => { modal = null; render(); });
      $("#mSend")?.addEventListener("click", sendRequest);
      $("#pSave")?.addEventListener("click", () => {
        me.role = $("#pRole").value;
        me.workStart = Math.min(23, Math.max(0, +$("#pStart").value));
        me.workEnd = Math.min(24, Math.max(1, +$("#pEnd").value));
        modal = null; refresh();
      });
    }

    function respond(id, action) {
      const r = REQ_SEED.find((x) => x.id === id);
      if (!r) return;
      r.responses[me.email] = action;
      if (action === "decline") r.status = "declined";
      else if (r.attendees.every((a) => r.responses[a] === "accept")) { r.status = "confirmed"; r.eventLink = "#"; }
      refresh();
    }

    function sendRequest() {
      const startH = modal.slot / 2;
      const attendees = [...selected].filter((e) => e !== me.email);
      REQ_SEED.push({
        id: "r" + Date.now(), title: $("#mTitle").value || "Team sync",
        requester: me.email, requesterName: me.name, attendees, status: "pending",
        vStart: startH, vEnd: startH + duration / 60,
        responses: {}, eventLink: null, notes: "", actions: [],
      });
      modal = null; refresh();
    }

    render();

    // optional: ?view=brief|request|notes auto-opens a modal (handy for screenshots / walkthroughs)
    const view = new URLSearchParams(location.search).get("view");
    if (view === "brief") $("[data-brief]")?.click();
    else if (view === "notes") $("[data-notes]")?.click();
    else if (view === "request") { const ok = document.querySelector(".slot.ok"); ok && ok.click(); }
  })();
  </script>
</body>
</html>
